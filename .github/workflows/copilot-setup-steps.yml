name: Copilot Setup Steps

# Sets up the environment for the Copilot coding agent when it runs in this repo.
# Keeps install + build fast and reproducible across Copilot sessions.

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify build
        run: npm run build
