name: Template Improvement
description: Improve a customer deliverable template (HLD / LLD / Runbook / KT / Hypercare) or reference architecture
title: "[template] <deliverable> – <short description>"
labels: ["innersource", "template"]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Template kind
      options:
        - "HLD"
        - "LLD"
        - "Runbook"
        - "KT plan"
        - "Hypercare plan"
        - "Reference architecture"
        - "Other engagement artifact"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's missing or wrong?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: input
    id: engagement
    attributes:
      label: Engagement / customer (anonymised) the change came from
      placeholder: "Customer A — multi-region VWAN rollout"
